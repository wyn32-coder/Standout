<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2309101a' stroke='%23f4722b' stroke-width='1.5'/%3E%3Crect x='5' y='8' width='22' height='4' rx='2' fill='%23f4722b'/%3E%3Crect x='5' y='14' width='15' height='4' rx='2' fill='%23f4722b' opacity='0.65'/%3E%3Crect x='5' y='20' width='18' height='4' rx='2' fill='%23f4722b' opacity='0.35'/%3E%3C/svg%3E"/>

  <title>Standout — AI Career Platform</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>

  <style>body{margin:0;padding:0;}
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#09101a;color:#ede8df;min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}

:root{
  --o:#f4722b;   /* orange — primary CTA, highest converting */
  --ol:#f79559;  /* orange light — hover */
  --od:#c95a20;  /* orange dark — pressed */
  --navy:#0d1a2e;
  --b1:#132236;  /* card bg */
  --b2:#1a2e45;  /* elevated surface */
  --b3:#213452;  /* border */
  --cr:#ede8df;  /* cream text */
  --mu:rgba(237,232,223,.52); /* muted text */
  --mu2:rgba(237,232,223,.28); /* very muted */
  --line:rgba(244,114,43,.18); /* orange border */
  --green:#3db87a; --red:#e05555; --yellow:#e8c84a; --blue:#5ba3d9; --purple:#9b7fe8;
}

.app{min-height:100vh;background:var(--navy)}

/* subtle dot grid */
.grid{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.025;
  background-image:radial-gradient(circle,rgba(244,114,43,.8) 1px,transparent 1px);
  background-size:32px 32px}

/* ── NAV ── */
.nav{padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(9,16,26,.96);backdrop-filter:blur(16px);z-index:200;border-bottom:1px solid var(--line)}
.logo{font-family:'Fraunces',serif;font-size:24px;color:var(--cr);letter-spacing:-.3px;display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-dot{width:10px;height:10px;background:var(--o);border-radius:50%;display:inline-block}
.nav-r{display:flex;align-items:center;gap:10px}
.nav-pill{font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--o);border:1px solid var(--line);padding:4px 12px;border-radius:20px}
.nav-cta{background:var(--o);color:#fff;border:none;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s}
.nav-cta:hover{background:var(--ol);box-shadow:0 4px 18px rgba(244,114,43,.3);transform:translateY(-1px)}

/* ── HERO ── */
.hero{padding:56px 24px 48px;text-align:center;position:relative;overflow:hidden;max-width:680px;margin:0 auto}
.hero-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(244,114,43,.1) 0%,transparent 68%);pointer-events:none}
.hero-tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--o);background:rgba(244,114,43,.1);border:1px solid var(--line);padding:5px 14px;border-radius:20px;margin-bottom:22px}
.hero h1{font-family:'Fraunces',serif;font-size:clamp(32px,5.5vw,54px);line-height:1.1;color:var(--cr);margin-bottom:16px;letter-spacing:-.5px}
.hero h1 i{font-style:italic;color:var(--o)}
.hero p{font-size:16px;color:var(--mu);max-width:420px;margin:0 auto 32px;line-height:1.7;font-weight:400}

/* ── HOOK WIDGET ── */
.hook{max-width:680px;margin:0 auto 48px;padding:0 24px}
.hook-card{background:var(--b1);border:2px solid var(--line);border-radius:16px;padding:28px;position:relative;overflow:hidden}
.hook-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--o),var(--ol))}
.hook-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--o);margin-bottom:10px}
.hook-title{font-family:'Fraunces',serif;font-size:22px;color:var(--cr);margin-bottom:6px;line-height:1.3}
.hook-sub{font-size:14px;color:var(--mu);margin-bottom:20px;line-height:1.6}
.hook-input-wrap{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:flex-start;margin-bottom:10px}
.hook-examples{display:flex;gap:7px;flex-wrap:wrap}
.hook-ex{font-size:11px;background:rgba(244,114,43,.07);border:1px solid var(--line);color:var(--o);padding:4px 11px;border-radius:14px;cursor:pointer;transition:all .15s;font-weight:500}
.hook-ex:hover{background:rgba(244,114,43,.14)}
.hook-result{margin-top:18px;animation:up .3s ease}
.hook-original{font-size:12px;color:var(--mu2);text-decoration:line-through;margin-bottom:12px;font-style:italic}
.hook-ver{background:var(--b2);border-radius:10px;padding:14px 16px;border-left:3px solid var(--o);margin-bottom:10px}
.hook-ver:last-child{margin-bottom:0}
.hook-ver-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--o);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.hook-ver-text{font-size:14px;color:var(--cr);line-height:1.65;font-weight:400}
.hook-ver-why{font-size:12px;color:var(--mu);margin-top:5px;font-style:italic}

/* ── JOURNEY ── */
.journey{max-width:680px;margin:0 auto 48px;padding:0 24px}
.journey-title{font-family:'Fraunces',serif;font-size:24px;color:var(--cr);text-align:center;margin-bottom:6px}
.journey-sub{font-size:14px;color:var(--mu);text-align:center;margin-bottom:28px}
.steps{display:flex;flex-direction:column;gap:12px}
.step{background:var(--b1);border:1px solid rgba(244,114,43,.14);border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s;position:relative}
.step:hover{border-color:var(--line);background:var(--b2);transform:translateX(4px)}
.step.active{border-color:var(--o);background:var(--b2);box-shadow:0 0 0 1px rgba(244,114,43,.15),0 4px 20px rgba(244,114,43,.08)}
.step.locked{opacity:.55;cursor:default}
.step.locked:hover{transform:none;background:var(--b1)}
.step-num{width:36px;height:36px;border-radius:50%;background:rgba(244,114,43,.12);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:16px;color:var(--o);flex-shrink:0;font-weight:400}
.step.active .step-num{background:var(--o);border-color:var(--o);color:#fff}
.step.done .step-num{background:var(--green);border-color:var(--green);color:#fff}
.step-body{flex:1}
.step-title{font-size:15px;font-weight:600;color:var(--cr);margin-bottom:2px}
.step-desc{font-size:13px;color:var(--mu);line-height:1.5}
.step-arrow{font-size:16px;color:var(--mu2);transition:color .18s}
.step:hover .step-arrow{color:var(--o)}
.step.active .step-arrow{color:var(--o)}
.step-badge{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:10px;margin-left:8px}
.step-badge.new{background:rgba(244,114,43,.15);color:var(--o)}
.step-badge.done{background:rgba(61,184,122,.15);color:var(--green)}

/* ── TOOL PANEL ── */
.panel{max-width:680px;margin:0 auto;padding:0 24px 60px;animation:up .3s ease}
.panel-back{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mu);cursor:pointer;margin-bottom:20px;transition:color .18s;font-weight:500;width:fit-content}
.panel-back:hover{color:var(--o)}
.panel-header{margin-bottom:24px}
.panel-step-badge{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--o);margin-bottom:8px}
.panel-title{font-family:'Fraunces',serif;font-size:28px;color:var(--cr);line-height:1.2;margin-bottom:8px}
.panel-sub{font-size:14px;color:var(--mu);line-height:1.65}

/* ── FORMS ── */
.card{background:var(--b1);border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:14px}
.card.hot{border-color:rgba(244,114,43,.35);box-shadow:0 0 24px rgba(244,114,43,.06)}
.fl{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--o);margin-bottom:7px;display:block}
.fhint{font-size:12px;color:var(--mu2);margin-top:5px;line-height:1.4}
textarea,input,select{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(244,114,43,.14);border-radius:9px;padding:12px 14px;color:var(--cr);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;resize:vertical;transition:border-color .18s;outline:none}
textarea:focus,input:focus{border-color:rgba(244,114,43,.5);background:rgba(255,255,255,.055)}
textarea::placeholder,input::placeholder{color:var(--mu2)}
.fg{margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.g2{grid-template-columns:1fr}.nav{padding:14px 16px}.hook-input-wrap{grid-template-columns:1fr;grid-template-rows:auto auto}}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:12px 22px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .18s;letter-spacing:.1px}
.bp{background:var(--o);color:#fff}
.bp:hover:not(:disabled){background:var(--ol);transform:translateY(-1px);box-shadow:0 5px 18px rgba(244,114,43,.3)}
.bp:disabled{opacity:.35;cursor:not-allowed}
.bo{background:transparent;color:var(--o);border:1px solid var(--line)}
.bo:hover:not(:disabled){border-color:var(--o);background:rgba(244,114,43,.07)}
.bo:disabled{opacity:.28;cursor:not-allowed}
.bgh{background:rgba(255,255,255,.05);color:var(--mu);border:1px solid rgba(255,255,255,.07)}
.bgh:hover{background:rgba(255,255,255,.08);color:var(--cr)}
.bfull{width:100%;justify-content:center;padding:14px}
.bsm{padding:8px 14px;font-size:13px}
.bxs{padding:5px 9px;font-size:11px;border-radius:6px}

.ibtn{background:rgba(244,114,43,.08);border:1px solid var(--line);color:var(--o);padding:5px 11px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;font-weight:500}
.ibtn:hover{background:rgba(244,114,43,.16)}

.spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--o);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.loading{display:flex;align-items:center;gap:10px;padding:28px;justify-content:center;color:var(--mu);font-size:13px}

/* ── RESULT CARD ── */
.rcard{background:var(--b2);border:1px solid rgba(244,114,43,.3);border-radius:12px;padding:22px;margin-top:14px;animation:up .3s ease}
.rhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:9px}
.rtitle{font-family:'Fraunces',serif;font-size:16px;color:var(--o)}
.racts{display:flex;gap:7px;flex-wrap:wrap}
.rbody{font-size:13px;line-height:1.9;color:rgba(237,232,223,.82);white-space:pre-wrap}
.rtbox{background:rgba(244,114,43,.04);border:1px solid rgba(244,114,43,.1);border-radius:9px;padding:14px;margin-top:16px}
.rttitle{font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--o);margin-bottom:9px}

/* ── TONES ── */
.trow{display:flex;gap:7px;flex-wrap:wrap}
.tchip{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid rgba(244,114,43,.14);background:transparent;color:var(--mu);transition:all .18s;font-family:'DM Sans',sans-serif}
.tchip.on{background:rgba(244,114,43,.13);border-color:var(--o);color:var(--o)}
.tchip:hover:not(.on){border-color:rgba(244,114,43,.3);color:rgba(237,232,223,.72)}

/* ── ATS RING ── */
.atsp{background:var(--b2);border:1px solid var(--line);border-radius:11px;padding:18px;margin-top:12px;animation:up .3s ease}
.atsh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
.ring{position:relative;width:68px;height:68px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.rnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:20px;color:var(--cr)}
.rnum.hi{color:var(--green)}.rnum.mi{color:var(--o)}.rnum.lo{color:var(--red)}
.achk{display:flex;align-items:flex-start;gap:8px;font-size:13px;line-height:1.5;color:var(--mu);padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.achk:last-child{border-bottom:none}

/* ── LINKEDIN ── */
.lirow{display:flex;gap:9px}
.lirow input{flex:1}
.lis{font-size:12px;margin-top:7px;padding:7px 12px;border-radius:7px;font-weight:500}
.lis.ok{background:rgba(61,184,122,.08);color:var(--green);border:1px solid rgba(61,184,122,.15)}
.lis.err{background:rgba(224,85,85,.08);color:var(--red);border:1px solid rgba(224,85,85,.15)}
.lis.ld{background:rgba(244,114,43,.06);color:var(--o);border:1px solid var(--line)}

/* ── PAYWALL ── */
.pw{background:linear-gradient(160deg,var(--b1),#0d1a2e);border:1px solid rgba(244,114,43,.35);border-radius:16px;padding:44px 32px;text-align:center;animation:up .3s ease}
.pw h2{font-family:'Fraunces',serif;font-size:30px;color:var(--cr);margin-bottom:10px;line-height:1.2}
.pw p{color:var(--mu);font-size:15px;margin-bottom:26px;line-height:1.65}
.ptag{font-family:'Fraunces',serif;font-size:58px;color:var(--o);display:inline-block;line-height:1;letter-spacing:-2px}
.psub{font-size:13px;color:var(--mu2);margin-bottom:28px;display:block}
.perks{list-style:none;margin-bottom:30px;display:inline-block;text-align:left}
.perks li{font-size:14px;color:rgba(237,232,223,.68);padding:6px 0;display:flex;align-items:center;gap:10px}
.perks li::before{content:'✓';color:var(--o);font-weight:700;font-size:13px}
.sbtn{background:var(--o);color:#fff;border:none;padding:16px 44px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:9px}
.sbtn:hover{background:var(--ol);transform:translateY(-2px);box-shadow:0 10px 28px rgba(244,114,43,.35)}
.snote{font-size:12px;color:var(--mu2);margin-top:11px}
.dbanner{background:rgba(244,114,43,.06);border:1px solid var(--line);border-radius:8px;padding:10px 16px;font-size:13px;color:var(--mu);margin-bottom:14px;text-align:center}
.dbanner strong{color:var(--o)}
.divl{height:1px;background:var(--line);margin:18px 0}

/* ── CAREER POSITIONING ── */
.cp-q{animation:up .28s ease}
.cp-qlabel{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--o);margin-bottom:6px}
.cp-qtitle{font-family:'Fraunces',serif;font-size:22px;color:var(--cr);margin-bottom:7px;line-height:1.3}
.cp-qsub{font-size:14px;color:var(--mu);margin-bottom:14px;line-height:1.6}
.cp-hints{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.cp-hint{font-size:12px;background:rgba(244,114,43,.08);border:1px solid var(--line);color:var(--o);padding:5px 12px;border-radius:14px;cursor:pointer;transition:all .15s;font-weight:500}
.cp-hint:hover{background:rgba(244,114,43,.15)}
.cp-nav{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.cp-step{font-size:12px;color:var(--mu2)}
.cp-si{background:var(--b2);border-left:3px solid var(--o);border-radius:0 9px 9px 0;padding:12px 15px;margin-bottom:9px}
.cp-siq{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu2);margin-bottom:3px}
.cp-sia{font-size:14px;color:rgba(237,232,223,.75);line-height:1.6}

/* ── COACHING ── */
.chat-box{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;max-height:380px;overflow-y:auto;padding-right:4px}
.chat-box::-webkit-scrollbar{width:3px}.chat-box::-webkit-scrollbar-thumb{background:rgba(244,114,43,.3);border-radius:3px}
.msg{max-width:86%;animation:up .2s ease}
.msg.ai{align-self:flex-start}.msg.user{align-self:flex-end}
.msg-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.msg.ai .msg-lbl{color:var(--o)}.msg.user .msg-lbl{color:var(--mu2);text-align:right}
.msg-bubble{padding:11px 14px;border-radius:12px;font-size:14px;line-height:1.65}
.msg.ai .msg-bubble{background:var(--b2);border:1px solid var(--line);color:rgba(237,232,223,.85);border-radius:4px 12px 12px 12px}
.msg.user .msg-bubble{background:rgba(244,114,43,.14);border:1px solid rgba(244,114,43,.28);color:var(--cr);border-radius:12px 4px 12px 12px}
.chat-input-row{display:flex;gap:9px;align-items:flex-end}
.chat-input-row textarea{resize:none;max-height:100px}
.c-starters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.c-starter{font-size:13px;background:var(--b2);border:1px solid var(--line);color:var(--mu);padding:7px 13px;border-radius:20px;cursor:pointer;transition:all .15s}
.c-starter:hover{border-color:var(--o);color:var(--o)}
.c-bullet{background:var(--b1);border:1px solid rgba(244,114,43,.28);border-radius:10px;padding:14px;margin-bottom:9px;animation:up .28s ease}
.c-bullet-text{font-size:14px;color:var(--cr);line-height:1.65;margin-bottom:7px}
.c-bullet-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctag{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:2px 8px;border-radius:8px;background:rgba(244,114,43,.12);color:var(--o)}

/* ── FEEDBACK ── */
.fb-grade-row{display:flex;align-items:center;gap:18px;background:var(--b2);border:1px solid var(--line);border-radius:11px;padding:18px;margin-bottom:12px}
.fb-grade{font-family:'Fraunces',serif;font-size:58px;line-height:1}
.fb-grade.A{color:var(--green)}.fb-grade.B{color:var(--o)}.fb-grade.C{color:var(--yellow)}.fb-grade.D,.fb-grade.F{color:var(--red)}
.fb-meta-lbl{font-size:14px;font-weight:600;color:var(--cr);margin-bottom:3px}
.fb-meta-sub{font-size:13px;color:var(--mu);line-height:1.5}
.fb-verdict{background:rgba(244,114,43,.06);border:1px solid rgba(244,114,43,.2);border-radius:11px;padding:18px;margin-bottom:12px}
.fb-vt{font-family:'Fraunces',serif;font-size:16px;color:var(--o);margin-bottom:7px}
.fb-vb{font-size:14px;color:rgba(237,232,223,.72);line-height:1.7}
.fb-sec{background:var(--b2);border:1px solid var(--line);border-radius:11px;padding:18px;margin-bottom:11px}
.fb-sec-t{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.fb-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;line-height:1.5}
.fb-item:last-child{border-bottom:none;padding-bottom:0}
.fb-il{color:var(--cr);font-weight:500;margin-bottom:2px;font-size:14px}
.fb-id{color:var(--mu);font-size:13px}
.blit{background:var(--b1);border-radius:8px;padding:11px 13px;border-left:3px solid transparent;margin-bottom:7px}

.stage-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}

/* ── MARKET ── */
.mkt-score{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:flex-start;background:var(--b2);border:1px solid var(--line);border-radius:11px;padding:18px;margin-bottom:14px}

/* ── SIM ── */
.sim-timer{display:flex;align-items:center;gap:10px;margin-bottom:12px}

/* ── ROLE IQ ── */
.ri-select-wrap{position:relative;margin-bottom:14px}
.ri-select{width:100%;appearance:none;-webkit-appearance:none;background:var(--b1);

.ri-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}

.ri-pill:hover{border-color:var(--line2);color:var(--cr)}

.ri-bench-v{font-size:12px;color:var(--mu);line-height:1.5}

@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

.import-tabs{display:flex;gap:6px;margin-bottom:14px}

.import-tab.on{background:rgba(244,114,43,.13);border-color:var(--o);color:var(--o)}

.upload-title{font-size:14px;font-weight:600;color:var(--cr);margin-bottom:4px}
.upload-sub{font-size:12px;color:var(--mu)}
.upload-input{display:none}

.import-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.import-tab{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--mu);transition:all .18s;font-family:"DM Sans",sans-serif}
.import-tab.on{background:rgba(244,114,43,.13);border-color:var(--o);color:var(--o)}

.upload-icon{font-size:28px;margin-bottom:8px}
.upload-title{font-size:14px;font-weight:600;color:var(--cr);margin-bottom:4px}
.upload-sub{font-size:12px;color:var(--mu)}

/* ── SIDEBAR LAYOUT ── */
.app-layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 57px)}
.sidebar{background:var(--b1);border-right:1px solid var(--line);padding:16px 0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:rgba(244,114,43,.3);border-radius:3px}
.sidebar-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mu2);padding:10px 16px 6px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:all .18s;border-left:2px solid transparent;position:relative}
.sidebar-item:hover{background:rgba(244,114,43,.06);color:var(--cr)}
.sidebar-item.active{background:rgba(244,114,43,.1);border-left-color:var(--o)}
.sidebar-item.done-item .sidebar-num{background:var(--green);border-color:var(--green);color:#fff}
.sidebar-num{width:22px;height:22px;border-radius:50%;background:rgba(244,114,43,.1);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--o);flex-shrink:0}
.sidebar-item.active .sidebar-num{background:var(--o);border-color:var(--o);color:#fff}
.sidebar-text{flex:1;min-width:0}
.sidebar-title{font-size:13px;font-weight:600;color:var(--cr);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item:not(.active) .sidebar-title{color:var(--mu)}
.sidebar-item:hover .sidebar-title{color:var(--cr)}
.sidebar-home{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--mu);transition:color .18s;margin-bottom:4px;border-bottom:1px solid var(--line);padding-bottom:14px}
.sidebar-home:hover{color:var(--o)}
.main-content{min-width:0;overflow-x:hidden}
/* Score Card — Home (big) + Tool (compact badge) */
.score-home-card{
  background:linear-gradient(135deg,rgba(13,21,32,.98),rgba(22,35,54,.95));
  border:2px solid rgba(46,204,135,.28);border-radius:18px;
  padding:24px 28px;margin:0 24px 28px;
  position:relative;overflow:hidden;
  animation:up .35s ease;
}
.score-home-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--green),rgba(46,204,135,.2),transparent)}
.score-home-card::after{content:'';position:absolute;top:-40px;right:-40px;
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(46,204,135,.07),transparent 70%);pointer-events:none}
.shc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.shc-left{}
.shc-eyebrow{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--green);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.shc-eyebrow-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
.shc-nums{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.shc-before{font-family:'Fraunces',serif;font-size:28px;color:rgba(232,226,217,.2);
  text-decoration:line-through;text-decoration-color:rgba(224,85,85,.4)}
.shc-arrow{font-size:18px;color:var(--mu2)}
.shc-after{font-family:'Fraunces',serif;font-size:64px;color:var(--green);
  line-height:1;letter-spacing:-2px;transition:all .4s ease}
.shc-after.bump{animation:scoreBump .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes scoreBump{
  0%{transform:scale(1)}
  35%{transform:scale(1.15);color:#fff;text-shadow:0 0 30px rgba(46,204,135,.6)}
  100%{transform:scale(1);color:var(--green);text-shadow:none}
}
.shc-slash{font-family:'Fraunces',serif;font-size:22px;color:var(--mu2);align-self:flex-end;margin-bottom:8px}
.shc-delta{display:inline-flex;align-items:center;gap:6px;
  background:rgba(46,204,135,.1);border:1.5px solid rgba(46,204,135,.25);
  border-radius:20px;padding:5px 14px;font-size:14px;font-weight:700;color:var(--green)}
.shc-right{text-align:right;flex-shrink:0}
.shc-tier{font-size:22px;margin-bottom:4px}
.shc-tier-label{font-family:'Fraunces',serif;font-size:18px;color:var(--cr);margin-bottom:3px}
.shc-tier-sub{font-size:12px;color:var(--mu)}
.shc-tools{display:flex;gap:8px;flex-wrap:wrap;padding-top:14px;border-top:1px solid rgba(255,255,255,.05)}
.shc-tool{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
  padding:5px 12px;border-radius:20px;transition:all .25s;cursor:default}
.shc-tool.done{background:rgba(46,204,135,.1);border:1px solid rgba(46,204,135,.22);color:var(--green)}
.shc-tool.todo{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:var(--mu2)}
.shc-tool-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.shc-nudge{font-size:12px;color:var(--mu);font-style:italic;margin-top:2px}
/* Compact badge shown when on a tool */
/* Floating scoreboard badge — fixed position, always visible on tools */
/* Floating score ring — always visible, every page */
.score-ring-wrap{
  position:fixed;
  top:72px;
  right:20px;
  z-index:80;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
  animation:badgeIn .4s cubic-bezier(.34,1.56,.64,1);
  cursor:default;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,.5));
}
@keyframes badgeIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.score-ring-svg{overflow:visible}
.score-ring-track{fill:none;stroke:rgba(255,255,255,.05);stroke-width:7}
.score-ring-fill{fill:none;stroke-width:7;stroke-linecap:round;
  transform-origin:center;transform:rotate(-90deg);
  transition:stroke-dasharray 1s cubic-bezier(.4,0,.2,1),stroke .4s ease}
.score-ring-num{
  font-family:'Fraunces',serif;
  font-size:34px;
  font-weight:400;
  fill:var(--green);
  text-anchor:middle;
  dominant-baseline:middle;
  transition:fill .4s ease;
}
.score-ring-denom{
  font-family:'Outfit',sans-serif;
  font-size:11px;
  fill:rgba(46,204,135,.45);
  text-anchor:middle;
  dominant-baseline:middle;
}
.score-ring-label{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:rgba(46,204,135,.55);text-align:center;
}
.score-ring-delta{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;font-weight:700;color:var(--green);
  background:rgba(46,204,135,.1);border:1px solid rgba(46,204,135,.2);
  border-radius:8px;padding:2px 9px;
}
.score-ring-tier{font-size:10px;color:rgba(46,204,135,.5);text-align:center;font-weight:500}
/* Pulse glow on score update */
@keyframes ringGlow{
  0%{filter:drop-shadow(0 4px 16px rgba(0,0,0,.5))}
  40%{filter:drop-shadow(0 0 20px rgba(46,204,135,.5)) drop-shadow(0 4px 16px rgba(0,0,0,.3))}
  100%{filter:drop-shadow(0 4px 16px rgba(0,0,0,.5))}
}
.score-ring-wrap.glow{animation:ringGlow .8s ease}
@media(max-width:760px){.score-ring-wrap{top:auto;bottom:80px;right:16px}}
@media(max-width:760px){
  .app-layout{grid-template-columns:1fr}
  .sidebar{display:none}
}

/* ── FEEDBACK BUTTON + MODAL ── */
.fb-trigger{
  position:fixed;bottom:24px;left:24px;z-index:90;
  background:var(--green);color:#000;
  border:none;border-radius:24px;
  padding:12px 20px;font-size:14px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:8px;

  position:fixed;inset:0;z-index:200;

.fb-modal-title{font-family:'Fraunces',serif;font-size:20px;color:var(--cr);margin-bottom:5px}
.fb-modal-sub{font-size:13px;color:var(--mu);margin-bottom:16px;line-height:1.55}
.fb-ratings{display:flex;gap:8px;margin-bottom:14px}
.fb-rating{

<body>
  <div id="root"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#09101a;color:#f4722b;font-family:sans-serif;font-size:18px;gap:12px"><div style="width:20px;height:20px;border:3px solid rgba(244,114,43,.3);border-top-color:#f4722b;border-radius:50%;animation:spin 0.8s linear infinite"></div>Loading Standout...</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style></div>
  <script type="text/babel" data-presets="react">

const { useState, useEffect, useRef, useCallback } = React;

const STRIPE_LINK = "https://buy.stripe.com/7sYfZh54cfRb3iReAVew800";
const FREE_LIMIT = 1;

// ─── FONT: DM Serif Display (elegant, readable) + DM Sans (clean body) ────────
// Research: serif headlines feel premium and trustworthy; sans body maximizes legibility
// Orange CTAs (#f4722b) convert 21-34% better than blue/green (CXL / Adobe 2025)
// Navy base (#0d1a2e) = trust anchor for professional tools


// ─── DATA ─────────────────────────────────────────────────────────────────────
const TONES = [{id:"professional",l:"Professional"},{id:"confident",l:"Confident"},{id:"conversational",l:"Conversational"},{id:"technical",l:"Technical"},{id:"creative",l:"Creative"}];
const TONE_I = {professional:"Formal, polished, corporate tone.",confident:"Bold, assertive. No hedging words.",conversational:"Warm and human. Not robotic.",technical:"Precise, detailed technical language.",creative:"Distinctive, memorable language."};
const STAGES = ["Applied","Phone Screen","Interview","Final Round","Offer","Rejected"];
const STAGE_C = {Applied:"#f4722b","Phone Screen":"#5ba3d9",Interview:"#9b7fe8","Final Round":"#f9a05a",Offer:"#3db87a",Rejected:"#e05555"};
const ROLES = [{id:"ic",icon:"💻",name:"Individual Contributor"},{id:"manager",icon:"👥",name:"Manager"},{id:"director",icon:"🏢",name:"Director / VP"},{id:"sales",icon:"📈",name:"Sales / CS"},{id:"product",icon:"🔧",name:"Product"},{id:"data",icon:"📊",name:"Data / Analytics"}];
const ROLE_INTEL = {
  ic:{lang:["Technical depth","Impact ownership","Problem-solving"],metrics:["Performance gains","Users affected","Bug reduction %"],framing:"Focus on individual contribution, technical skill, measurable impact.",benchmarks:[{t:"Top 10% include",v:"Specific technologies, measurable performance gains, and open source contributions."},{t:"Usually missing",v:"Scale (users affected, data volume) and comparison to team average."}]},
  manager:{lang:["Team leadership","Cross-functional alignment","Hiring & development"],metrics:["Team size","Attrition rate","OKR achievement %"],framing:"Emphasize people leadership and team outcomes. Show what your team accomplished.",benchmarks:[{t:"Top 10% include",v:"Team size, retention rates, and business outcomes driven by the team."},{t:"Usually missing",v:"Before/after team performance metrics."}]},
  director:{lang:["Strategic vision","P&L ownership","Organizational design"],metrics:["Revenue owned","Budget managed","Org size"],framing:"Lead with business outcomes and scale. Quantify P&L impact and strategic wins.",benchmarks:[{t:"Top 10% include",v:"Revenue/P&L ownership, org size, and board-level interaction."},{t:"Usually missing",v:"Business context and strategy vs execution narrative."}]},
  sales:{lang:["Revenue generation","Quota attainment","Client retention"],metrics:["Quota %","ARR/MRR owned","Churn reduction"],framing:"Lead with numbers. Every bullet ties back to revenue, retention, or pipeline.",benchmarks:[{t:"Top 10% include",v:"Quota % consistently, ARR book size, and named enterprise logos."},{t:"Usually missing",v:"Ramp time to quota and year-over-year growth."}]},
  product:{lang:["User impact","Business alignment","Roadmap ownership"],metrics:["DAU/MAU growth","Conversion lift","Revenue attributed"],framing:"Show the business outcome, not just the feature. Connect decisions to user metrics.",benchmarks:[{t:"Top 10% include",v:"Specific metric improvements tied to launches."},{t:"Usually missing",v:"Failure/learning stories and tradeoff decisions."}]},
  data:{lang:["Analytical rigor","Business impact","Stakeholder influence"],metrics:["Model accuracy","Revenue attributed","Pipeline scale"],framing:"Connect technical work to business decisions. Show both depth and impact.",benchmarks:[{t:"Top 10% include",v:"Business decisions changed by analysis and scale of systems built."},{t:"Usually missing",v:"Stakeholder influence — who acted on your work."}]},
};
const CP_QS = [
  {label:"Core Value",title:"What problems do you solve better than anyone?",sub:"Think about what breaks when you're not around. What do people come to you for that they can't get elsewhere?",hints:["Revenue leakage","Scaling chaos","Customer churn","Technical debt","Team performance"]},
  {label:"Scale & Impact",title:"What's the scale and impact of your work?",sub:"Give me numbers — team size, budget, ARR, users, growth %. Specifics make the difference between a good resume and a great one.",hints:["$1M–$50M budget","10–500 person teams","Enterprise Fortune 500","1M+ users","Series A–C"]},
  {label:"Differentiator",title:"What do you have that other candidates at your level don't?",sub:"This is your unfair advantage. A combination of skills, an unusual background, a specific domain, a track record others can't match.",hints:["Domain depth + business sense","Built something from zero","Rare technical + leadership mix","Industry specialist","Turned around something broken"]},
  {label:"Signature Win",title:"What's the achievement you're most proud of?",sub:"The one story you tell in every interview. Include what the situation was, what you did, and what the measurable outcome was.",hints:["Grew revenue/retention by X%","Built team from 0 to N","Launched product that did X","Saved $X or cut costs by X%","Won major client or deal"]},
  {label:"Career Story",title:"What's the through-line of your career?",sub:"If a recruiter had 10 seconds — what's the one thing that should stick? Your narrative arc, not your job history.",hints:["Operator who builds and scales","IC who grew into strategic leader","Domain expert turned cross-functional leader","Builder who turns chaos into systems","Revenue-focused operator"]},
];

async function callClaude(prompt, maxT = 1000) {
  try {
    const res = await fetch("/api/transform", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ type:"general", prompt })
    });
    const data = await res.json();
    return data.text || "";
  } catch(e) {
    console.error("API error:", e);
    return "";
  }
}
function pJ(t){try{return JSON.parse(t.replace(/```json|```/g,"").trim());}catch{return null;}}

// ─── ATS ──────────────────────────────────────────────────────────────────────
function ATSPanel({result,jobDesc,onImprove}){
  if(!result)return null;
  let score=0;const checks=[];
  const hm=/\d+%|\d+x|\$[\d,]+|\d+\s*(people|team|clients)/i.test(result);
  checks.push({ok:hm,icon:hm?"✅":"⚠️",t:hm?"Quantified achievements present":"Add metrics — numbers boost ATS ranking"});if(hm)score+=25;
  const sc=["experience","education","skills","summary","professional","work history","qualifications","profile","objective","certifications","achievements"].filter(s=>result.toLowerCase().includes(s));
  checks.push({ok:sc.length>=3,icon:sc.length>=3?"✅":"⚠️",t:sc.length>=3?`Section headers found`:"Add standard section headers"});if(sc.length>=3)score+=20;
  const wc=result.split(/\s+/).length;
  checks.push({ok:wc>=300&&wc<=700,icon:wc>=300&&wc<=700?"✅":"⚠️",t:`${wc} words — ${wc>=300&&wc<=700?"ideal range":"aim for 300–700"}`});if(wc>=300&&wc<=700)score+=15;
  const vc=["led","built","created","managed","developed","launched","drove","increased","reduced","improved","achieved","delivered","spearheaded","oversaw","generated","established","implemented","designed","executed","coordinated","directed","produced","grew","saved","transformed","streamlined","negotiated","trained","mentored","analyzed","identified","secured","owned","scaled","deployed","partnered","collaborated","facilitated","introduced","optimized"].filter(v=>new RegExp(`\\b${v}\\b`,"i").test(result)).length;
  checks.push({ok:vc>=3,icon:vc>=3?"✅":"⚠️",t:vc>=3?`${vc} action verbs found`:`Only ${vc} action verbs — add more`});if(vc>=3)score+=20;
  if(jobDesc?.length>50){const jw=jobDesc.toLowerCase().split(/\W+/).filter(w=>w.length>4);const pct=Math.round((jw.filter(w=>result.toLowerCase().includes(w)).length/Math.max(jw.length,1))*100);checks.push({ok:pct>=40,icon:pct>=40?"✅":"⚠️",t:pct>=40?`${pct}% keyword match`:`${pct}% keyword match — re-tailor`});if(pct>=40)score+=20;}
  else{score+=20;checks.push({ok:true,icon:"ℹ️",t:"Paste a JD to check keyword match"});}
  score=Math.min(score,100);
  const cls=score>=80?"hi":score>=55?"mi":"lo",col=score>=80?"#3db87a":score>=55?"#f4722b":"#e05555";
  const r=30,circ=2*Math.PI*r,dash=(score/100)*circ;
    const weakChecks = checks.filter(c=>!c.ok).map(c=>c.t).join(", ");
  return(<div className="atsp"><div className="atsh"><div><div style={{fontFamily:"'Fraunces',serif",fontSize:15,color:"var(--cr)"}}>ATS Score</div><div style={{fontSize:12,color:"var(--mu)",marginTop:2}}>Screening compatibility</div></div><div className="ring"><svg width="68" height="68" viewBox="0 0 68 68"><circle cx="34" cy="34" r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth="5"/><circle cx="34" cy="34" r={r} fill="none" stroke={col} strokeWidth="5" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 1s ease"}}/></svg><div className={`rnum ${cls}`}>{score}</div></div></div><div>{checks.map((c,i)=><div key={i} className="achk"><span>{c.icon}</span><span>{c.t}</span></div>)}</div>{weakChecks&&onImprove&&<div style={{marginTop:14,paddingTop:14,borderTop:"1px solid var(--line)",textAlign:"center"}}><button className="btn bp bsm" onClick={()=>onImprove("ATS",weakChecks)} style={{width:"100%",justifyContent:"center"}}>⚡ Apply ATS Improvements to Resume</button><div style={{fontSize:11,color:"var(--mu2)",marginTop:6}}>Rewrites your resume to fix the issues above</div></div>}</div>);
}

// ─── TOOL: CAREER POSITIONING ─────────────────────────────────────────────────
function CareerPositioning({onPositioningComplete, existingPositioning}){
  const [targetRole, setTargetRole] = useState("");    // step 0 — what role they want
  const [roleSubmitted, setRoleSubmitted] = useState(false);
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [cur, setCur] = useState("");
  const [clarifyQ, setClarifyQ] = useState(null);
  const [clarifyA, setClarifyA] = useState("");
  const [checking, setChecking] = useState(false);
  const [done, setDone] = useState(false);
  const [gen, setGen] = useState(false);
  const [genPhase, setGenPhase] = useState("");        // "building" | "validating"
  const [pos, setPos] = useState(null);
  const [validation, setValidation] = useState(null); // {role, differentiation, compelling, suggestions}
  const [refining, setRefining] = useState(false);
  const [refineInput, setRefineInput] = useState("");
  const [refineLoading, setRefineLoading] = useState(false);
  const [whyOpen, setWhyOpen] = useState(false);
  const q = CP_QS[step];

  // Call parent ONLY when user confirms — not just on generate
  // (handled in the confirm button)

  // Submit current answer — AI checks if clarification needed
  const submitAnswer = async() => {
    if(!cur.trim()) return;
    setChecking(true);
    setClarifyQ(null);

    // Ask AI: is this answer specific enough, or does it need one clarifying question?
    const checkPrompt = `You are a career coach reviewing an answer to: "${q.title}"
Answer given: "${cur}"

Is this answer specific enough to build strong career positioning? 
- If YES (has metrics, specifics, or clear context) — reply with just: CLEAR
- If NO (too vague, missing scale/impact/numbers) — reply with ONE short follow-up question (under 15 words) to get the missing specifics. Just the question, nothing else.`;

    const check = await callClaude(checkPrompt, 200);
    setChecking(false);

    if(check.trim().toUpperCase().startsWith("CLEAR") || check.trim().length > 80){
      // Answer is good OR AI gave a long response (treat as clear) — move on
      proceedWithAnswer(cur, null);
    } else {
      // AI has a follow-up question
      setClarifyQ(check.trim().replace(/^["']|["']$/g,""));
    }
  };

  // Submit clarification answer and proceed
  const submitClarification = () => {
    proceedWithAnswer(cur, clarifyA.trim()||null);
    setClarifyA("");
    setClarifyQ(null);
  };

  // Skip clarification and proceed anyway
  const skipClarification = () => {
    proceedWithAnswer(cur, null);
    setClarifyA("");
    setClarifyQ(null);
  };

  const proceedWithAnswer = async(answer, clarification) => {
    const fullAnswer = clarification ? `${answer} — ${clarification}` : answer;
    const na = {...answers, [q.label]: fullAnswer};
    setAnswers(na);
    setCur("");

    if(step < CP_QS.length - 1){
      setStep(s=>s+1);
    } else {
      // All 5 answered — build positioning then validate
      setDone(true);
      setGen(true);
      setGenPhase("building");
      const allAnswers = Object.entries(na).map(([k,v])=>`${k}: ${v}`).join("\n");

      // Step 1: Build positioning bridging story → target role
      const raw = await callClaude(`You are a senior career strategist and executive coach. Build powerful career positioning that bridges this person's story to their target role.

TARGET ROLE: ${targetRole}

THEIR STORY:
${allAnswers}

Your job: Build positioning that makes them the OBVIOUS choice for "${targetRole}" — not generic positioning, but positioning that speaks directly to what that specific role needs.

Return ONLY valid JSON:
{
  "headline": "8-12 word headline that speaks directly to what a ${targetRole} hiring manager needs — use their actual achievements and language",
  "summary": "2-3 sentences in first person. Their story arc + what they deliver + why it matters for ${targetRole}",
  "uniqueAngle": "1 sentence — the specific combination of experience/skills/achievements that no other ${targetRole} candidate at this level has",
  "targetRoles": ["${targetRole}", "adjacent role 2", "adjacent role 3"],
  "powerPhrases": ["phrase directly relevant to ${targetRole} 1", "phrase 2", "phrase 3", "phrase 4"],
  "roleConnection": "1 sentence explaining exactly why this positioning makes them compelling for ${targetRole} specifically"
}

Rules: Be specific. Use their actual language and numbers. The headline must make a ${targetRole} hiring manager say 'I need to talk to this person.'`, 1000);

      const p = pJ(raw);

      // Step 2: Validate it against 3 criteria — AI tells them, doesn't ask
      setGenPhase("validating");
      const valRaw = await callClaude(`You are a senior recruiter who hires for "${targetRole}" roles. Evaluate this career positioning.

POSITIONING:
Headline: ${p?.headline}
Unique Angle: ${p?.uniqueAngle}
Summary: ${p?.summary}

TARGET ROLE: ${targetRole}

Evaluate against these 3 criteria. For each give a score (strong/good/needs-work) and 1-2 sentence specific feedback. Also give one concrete suggestion to improve if needed.

Return ONLY valid JSON:
{
  "roleAlignment": {"score": "strong|good|needs-work", "feedback": "specific feedback about whether headline speaks to ${targetRole} hiring manager needs", "suggestion": "specific improvement if needed, or null"},
  "differentiation": {"score": "strong|good|needs-work", "feedback": "does the unique angle genuinely differentiate from other ${targetRole} candidates at this level", "suggestion": "specific improvement if needed, or null"},
  "compelling": {"score": "strong|good|needs-work", "feedback": "would a ${targetRole} hiring manager find this compelling enough to reach out", "suggestion": "specific improvement if needed, or null"},
  "overallVerdict": "one sentence — honest overall assessment"
}`, 600);

      setPos(p);
      setValidation(pJ(valRaw));
      setGen(false);
      setGenPhase("");
    }
  };

  if(done&&gen) return(
    <div style={{padding:"40px 0",textAlign:"center"}}>
      <div className="spin" style={{width:24,height:24,margin:"0 auto 16px"}}/>
      <div style={{fontFamily:"'Fraunces',serif",fontSize:18,color:"var(--cr)",marginBottom:6}}>
        {genPhase==="building"?"Building your positioning…":"Validating against your target role…"}
      </div>
      <div style={{fontSize:13,color:"var(--mu)"}}>
        {genPhase==="building"?"Bridging your story to "+targetRole:"Checking role alignment, differentiation, and impact…"}
      </div>
    </div>
  );

  // Score color helper
  const scoreColor = s => s==="strong"?"var(--green)":s==="good"?"var(--o)":"var(--red)";
  const scoreIcon  = s => s==="strong"?"✅":s==="good"?"⚠️":"🔧";

  if(done&&pos)return(<div style={{animation:"up .3s ease"}}>

    {/* Positioning headline */}
    <div style={{background:"rgba(244,114,43,.08)",border:"2px solid rgba(244,114,43,.3)",borderRadius:14,padding:24,marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:600,letterSpacing:2,textTransform:"uppercase",color:"var(--o)",marginBottom:8}}>Your Positioning — Built for {targetRole}</div>
      <div style={{fontFamily:"'Fraunces',serif",fontSize:24,color:"var(--cr)",lineHeight:1.2,marginBottom:10}}>{pos.headline}</div>
      <div style={{fontSize:14,color:"rgba(237,232,223,.72)",lineHeight:1.75,marginBottom:10}}>{pos.summary}</div>
      <div style={{fontSize:13,color:"var(--o)",fontStyle:"italic",borderTop:"1px solid var(--line)",paddingTop:10,marginTop:6}}>{pos.uniqueAngle}</div>
      {pos.roleConnection&&<div style={{fontSize:12,color:"var(--mu)",marginTop:8,background:"rgba(255,255,255,.03)",borderRadius:6,padding:"8px 10px"}}>🎯 {pos.roleConnection}</div>}
    </div>

    {/* AI Validation — tells them, doesn't ask */}
    {validation&&<div style={{marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"var(--mu2)",marginBottom:10}}>Positioning Validation</div>

      {[
        {key:"roleAlignment",   label:"Speaks to your target role"},
        {key:"differentiation", label:"Differentiates you at this level"},
        {key:"compelling",      label:"Compelling to a hiring manager"},
      ].map(({key,label})=>{
        const v = validation[key];
        if(!v) return null;
        return(
          <div key={key} style={{background:"var(--b1)",border:"1px solid var(--line)",borderRadius:10,padding:"14px 16px",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <span style={{fontSize:15}}>{scoreIcon(v.score)}</span>
              <span style={{fontSize:13,fontWeight:600,color:"var(--cr)",flex:1}}>{label}</span>
              <span style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:scoreColor(v.score)}}>{v.score}</span>
            </div>
            <div style={{fontSize:13,color:"var(--mu)",lineHeight:1.6,marginBottom:v.suggestion?6:0}}>{v.feedback}</div>
            {v.suggestion&&<div style={{fontSize:12,color:"var(--o)",fontStyle:"italic",borderTop:"1px dashed var(--line)",paddingTop:6,marginTop:6}}>💡 {v.suggestion}</div>}
          </div>
        );
      })}

      {validation.overallVerdict&&<div style={{fontSize:13,color:"var(--mu)",fontStyle:"italic",textAlign:"center",padding:"8px 0"}}>{validation.overallVerdict}</div>}
    </div>}

    {/* Power phrases + target roles */}
    <div className="g2" style={{marginBottom:14}}>
      <div className="card" style={{margin:0}}><div className="fl">Target Roles</div>{pos.targetRoles?.map((r,i)=><div key={i} style={{fontSize:13,color:"rgba(237,232,223,.72)",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>{r}</div>)}</div>
      <div className="card" style={{margin:0}}><div className="fl">Power Phrases</div>{pos.powerPhrases?.map((p,i)=><div key={i} style={{fontSize:12,color:"var(--o)",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.04)",fontStyle:"italic"}}>"{p}"</div>)}</div>
    </div>

    {/* Refine section */}
    {!refining&&<div style={{marginBottom:14}}>
      <button className="btn bgh bsm" style={{width:"100%",justifyContent:"center"}} onClick={()=>setRefining(true)}>
        ✏️ Refine This Positioning
      </button>
    </div>}

    {refining&&<div style={{background:"var(--b1)",border:"1px solid var(--line)",borderRadius:10,padding:16,marginBottom:14,animation:"up .2s ease"}}>
      <div style={{fontSize:13,fontWeight:600,color:"var(--cr)",marginBottom:4}}>What would you like to strengthen?</div>
      <div style={{fontSize:12,color:"var(--mu)",marginBottom:10,lineHeight:1.5}}>
        {validation?.roleAlignment?.suggestion||validation?.differentiation?.suggestion||validation?.compelling?.suggestion
          ? `The AI suggested: ${[validation?.roleAlignment?.suggestion,validation?.differentiation?.suggestion,validation?.compelling?.suggestion].filter(Boolean)[0]}`
          : "Tell me what feels off — too generic? Missing a key achievement? Wrong emphasis?"}
      </div>
      <textarea rows={3} placeholder="e.g. 'Add my churn reduction metric' or 'Make it more senior-sounding' or 'Emphasize my team leadership more'" value={refineInput} onChange={e=>setRefineInput(e.target.value)}/>
      <div style={{display:"flex",gap:9,marginTop:10}}>
        <button className="btn bp bsm" disabled={!refineInput.trim()||refineLoading} onClick={async()=>{

function RecruiterSim({resumeText,onImprove}){
  const [running,setRunning]=useState(false);const [progress,setProgress]=useState(0);const [phase,setPhase]=useState(0);const [done,setDone]=useState(false);const [analysis,setAnalysis]=useState(null);const timer=useRef(null);
  const PHASES=[{t:0,l:"Scanning name & title…"},{t:1.5,l:"Reading most recent role…"},{t:3,l:"Checking company names…"},{t:4,l:"Scanning for numbers…"},{t:5.5,l:"Verdict forming…"}];
  const run=async()=>{
    setRunning(true);setDone(false);setProgress(0);setPhase(0);setAnalysis(null);
    const [simR]=await Promise.all([callClaude(`Senior recruiter, 6-second scan. Return ONLY JSON:\n${resumeText}\n{"firstImpression":"1-sentence gut reaction","whatStoodOut":["t1","t2","t3"],"whatWasMissed":["m1","m2"],"eyePath":["1st","2nd","3rd"],"wouldAdvance":true,"advanceReason":"1 sentence","sixSecondVerdict":"honest 2-sentence verdict"}`),new Promise(resolve=>{let t=0;timer.current=setInterval(()=>{t+=.1;setProgress(Math.min((t/6)*100,100));setPhase(Math.max(0,PHASES.filter(p=>p.t<=t).length-1));if(t>=6){clearInterval(timer.current);resolve();}},100);})]);
    setAnalysis(pJ(simR));setRunning(false);setDone(true);
  };
  return(<div>{!running&&!done&&(<div className="card" style={{textAlign:"center",padding:36}}><div style={{fontSize:36,marginBottom:12}}>⏱️</div><div style={{fontFamily:"'Fraunces',serif",fontSize:20,color:"var(--cr)",marginBottom:8}}>6-Second Recruiter Simulation</div><p style={{fontSize:14,color:"var(--mu)",marginBottom:22,lineHeight:1.65}}>Watch how a recruiter's eyes scan your resume. See what gets noticed, what gets skipped, and whether you'd advance.</p><button className="btn bp" onClick={run}>Start Simulation ▶</button></div>)}
  {(running||done)&&(<div><div className="sim-timer"><div className="sim-tick">{Math.min(6,Math.round(progress*.06*10)/10).toFixed(1)}s</div><div className="sim-bar-wrap"><div className="sim-bar-fill" style={{width:`${progress}%`}}/></div><span style={{fontSize:11,color:"var(--mu2)",flexShrink:0}}>/ 6 sec</span></div><div className="sim-phase">{running?PHASES[Math.min(phase,PHASES.length-1)]?.l:"Complete"}</div><div className="sim-txt">{(resumeText||"").split("\n").slice(0,18).map((line,i)=><span key={i} style={{display:"block",opacity:done?1:(i<(phase+1)*3?1:.15),transition:"opacity .4s ease"}}>{line||"\u00A0"}</span>)}{(resumeText||"").split("\n").length>18&&<span style={{opacity:.3}}>…</span>}</div>
  {done&&analysis&&(<div style={{animation:"up .3s ease",marginTop:14}}><div style={{background:analysis.wouldAdvance?"rgba(61,184,122,.09)":"rgba(224,85,85,.09)",border:`1px solid ${analysis.wouldAdvance?"#3db87a":"#e05555"}`,borderRadius:10,padding:16,marginBottom:12}}><div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:analysis.wouldAdvance?"#3db87a":"#e05555",marginBottom:5}}>{analysis.wouldAdvance?"✓ Would Advance":"✕ Would Not Advance"}</div><div style={{fontSize:14,color:"rgba(237,232,223,.78)",lineHeight:1.65}}>{analysis.sixSecondVerdict}</div></div>{[{label:"👁 What stood out",items:analysis.whatStoodOut,c:"var(--green)"},{label:"🚫 What was missed",items:analysis.whatWasMissed,c:"var(--red)"},{label:"➡ Eye path",items:analysis.eyePath,c:"var(--blue)"}].map((sec,si)=>sec.items?.length>0&&(<div key={si} className="fb-sec"><div className="fb-sec-t" style={{color:sec.c}}>{sec.label}</div>{sec.items.map((item,i)=><div key={i} className="sim-vi"><span style={{flexShrink:0}}>{si===0?"✦":si===1?"○":`${i+1}.`}</span><span>{item}</span></div>)}</div>))}<div style={{display:"flex",gap:9,flexWrap:"wrap"}}><button className="btn bgh bsm" onClick={()=>{setDone(false);setProgress(0);}}>Run Again</button>{analysis&&onImprove&&<button className="btn bp bsm" onClick={()=>onImprove("6-Second",`What was missed: ${analysis.whatWasMissed?.join(", ")}. First impression: ${analysis.firstImpression}. Eye path issues: recruiter saw ${analysis.eyePath?.join(" then ")}.`)}>⚡ Apply 6-Second Fixes to Resume</button>}</div></div>)}</div>)}</div>);
}

// ── 4-DIMENSION SCORING ENGINE ──
// Returns {total, ats, recruiter, roleFit, positioning, breakdown}

function calcResumeScore(text, {
  positioning=null,
  toolsRun=new Set(),
  improvementsApplied=new Set(),
  jobDesc=""
}={}){
  if(!text) return {total:0, ats:0, recruiter:0, roleFit:0, positioning:0, breakdown:[]};
  const t = text.toLowerCase();

  // ── DIMENSION 1: ATS READINESS (0-25) ──
  let ats = 0;
  const breakdown = [];

  // Metrics/numbers (0-8)
  const hasMetrics = /[0-9]+%|[0-9]+x|\$[0-9,]+|[0-9]+\s*(people|team|clients|users|customers|accounts)/i.test(text);
  const metricCount = (text.match(/\b\d+[%x]|\$[\d,]+|\d+\s*(people|team|clients|users)/gi)||[]).length;
  const metricPts = Math.min(8, metricCount * 2);
  ats += metricPts;
  breakdown.push({dim:"ATS", label:"Quantified achievements", pts:metricPts, max:8, ok:metricPts>=4});

  // Section headers (0-6)
  const headers = ["experience","education","skills","summary","professional summary","certifications","achievements","qualifications"].filter(s=>t.includes(s));
  const headerPts = Math.min(6, headers.length * 2);
  ats += headerPts;
  breakdown.push({dim:"ATS", label:"Section headers", pts:headerPts, max:6, ok:headerPts>=4});

  // Action verbs (0-6)
  const verbs = ["led","built","created","managed","developed","launched","drove","increased","reduced","improved","achieved","delivered","spearheaded","oversaw","generated","established","implemented","designed","executed","coordinated","transformed","streamlined","optimized","architected","negotiated","secured","scaled","deployed","mentored","trained","grew","saved"].filter(v=>t.includes(v));
  const verbPts = Math.min(6, Math.floor(verbs.length * 0.75));
  ats += verbPts;
  breakdown.push({dim:"ATS", label:"Action verbs", pts:verbPts, max:6, ok:verbPts>=4});

  // Word count sweet spot (0-5)
  const wc = text.split(/\s+/).length;
  const wcPts = (wc>=300 && wc<=750) ? 5 : (wc>=200 && wc<=900) ? 3 : 1;
  ats += wcPts;
  breakdown.push({dim:"ATS", label:`Word count (${wc} words)`, pts:wcPts, max:5, ok:wcPts>=4});

  ats = Math.min(25, ats);

  // ── DIMENSION 2: RECRUITER IMPACT (0-25) ──
  // Starts low — needs validation tools to climb
  let recruiter = 6; // baseline for having a generated resume
  
  if(toolsRun.has("Recruiter")) recruiter += 6;
  if(improvementsApplied.has("Recruiter")) recruiter += 8;
  if(toolsRun.has("6-Second")) recruiter += 3;
  if(improvementsApplied.has("6-Second")) recruiter += 5;
  
  // Bonus: clear contact info and strong summary
  if(text.includes("@") && text.match(/\d{3}[-.\s]\d{3}/)) recruiter += 2;
  
  recruiter = Math.min(25, recruiter);
  breakdown.push({dim:"Recruiter", label:"Recruiter validation", pts:recruiter, max:25, 
    ok:recruiter>=15, hint:recruiter<15?"Run Recruiter Feedback to improve":null});

  // ── DIMENSION 3: ROLE FIT (0-25) ──
  // Starts very low — needs role-specific tools
  let roleFit = 4; // baseline

  if(toolsRun.has("Market")) roleFit += 6;
  if(improvementsApplied.has("Market")) roleFit += 5;
  if(toolsRun.has("RoleIQ")) roleFit += 6;
  if(improvementsApplied.has("RoleIQ")) roleFit += 6;

  // Keyword match bonus if JD provided
  if(jobDesc && jobDesc.length > 50){
    const jw = jobDesc.toLowerCase().split(/\W+/).filter(w=>w.length>4);
    const matched = jw.filter(w=>t.includes(w)).length;
    const matchPct = matched / Math.max(jw.length, 1);
    roleFit += Math.round(matchPct * 4);
  }

  roleFit = Math.min(25, roleFit);
  breakdown.push({dim:"Role Fit", label:"Role alignment", pts:roleFit, max:25,
    ok:roleFit>=15, hint:roleFit<10?"Run Role Intelligence to close this gap":null});

  // ── DIMENSION 4: POSITIONING STRENGTH (0-25) ──
  let pos = 0;

  if(positioning){
    pos += 10; // has positioning
    if(positioning.headline && positioning.headline.length > 20) pos += 5;
    if(positioning.uniqueAngle && positioning.uniqueAngle.length > 20) pos += 5;
    if(positioning.powerPhrases && positioning.powerPhrases.length >= 3) pos += 5;
  }

  pos = Math.min(25, pos);
  breakdown.push({dim:"Positioning", label:"Career positioning", pts:pos, max:25,
    ok:pos>=15, hint:pos===0?"Define Your Positioning first — it unlocks everything":pos<15?"Strengthen your positioning story":null});

  const total = Math.min(100, Math.round(ats + recruiter + roleFit + pos));

  return {total, ats, recruiter, roleFit, positioning:pos, breakdown};
}

          console.error("PDF parse error:", pdfErr);
          setFileStatus("pdferror");
          return;
        }
      }
      // ── PLAIN TEXT / RTF / DOC ──
      else{
        text = await new Promise((resolve, reject)=>{
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result);
          reader.onerror = reject;
          reader.readAsText(file);

        return;
      }

      // Send to Claude for parsing

      let p = null;
      const cleaned = t.replace(/```json|```/g,"").trim();
      try { p = JSON.parse(cleaned); } catch(_) {}
      if(!p){ try{ const m=cleaned.match(/\{[\s\S]*\}/); if(m) p=JSON.parse(m[0]); }catch(_){} }

      if(p && Object.values(p).some(v=>v&&v!=="null")){
        // Deep converter — handles arrays of objects (experience/education entries)
        const stringify = (v) => {
          if(!v || v==="null") return "";
          if(typeof v === "string") return v;
          if(Array.isArray(v)){
            return v.map(item=>{
              if(typeof item === "string") return item;
              if(typeof item === "object"){
                // Format job/education entry as readable text
                const parts = [];
                if(item.company||item.organization||item.school||item.institution) parts.push(item.company||item.organization||item.school||item.institution);
                if(item.title||item.position||item.role||item.degree) parts.push(item.title||item.position||item.role||item.degree);
                if(item.startDate||item.start||item.dates||item.date||item.year) parts.push(item.startDate||item.start||item.dates||item.date||item.year);
                if(item.endDate||item.end) parts.push("— "+( item.endDate||item.end));
                const header = parts.join(" | ");
                const bullets = item.achievements||item.bullets||item.responsibilities||item.description||item.summary||"";
                const bulletText = Array.isArray(bullets) ? bullets.map(b=>"• "+b).join("\n") : (bullets||"");
                return header + (bulletText ? "\n"+bulletText : "");
              }
              return String(item);
            }).join("\n\n");

            return Object.values(v).filter(Boolean).join(", ");
          }

      }
